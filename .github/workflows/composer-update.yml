name: Update composer.lock and generate update PR
on:
  workflow_call:
    inputs:
      PHP_VERSION:
        description: PHP version
        default: "8.1"
        required: false
        type: string
      PHP_EXTENSIONS:
        description: PHP extensions
        default: ""
        required: false
        type: string
      BYPASS_SECURITY:
        description: Bypass composer security audit during update
        default: false
        required: false
        type: boolean
    secrets:
      COMPOSER_AUTH_JSON:
        description: Authentication for privately hosted packages and repositories as a JSON formatted object.
        required: false
      REPO_TOKEN:
        description: A repository access token that can be used to authenticate with the GitHub API.
        required: true

permissions:
  pull-requests: write
  contents: write

jobs:
  update-dependencies:
    name: Update composer.lock
    runs-on: ubuntu-latest
    env:
      COMPOSER_AUTH: "${{ secrets.COMPOSER_AUTH_JSON }}"
    concurrency:
      group: ${{ github.repository }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Get last release tag
        id: last_tag
        run: |
          last_tag=$(git describe --tags --abbrev=0 \
            --match='[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].*' \
            2>/dev/null || true)
          echo "last_tag=$last_tag" >> "$GITHUB_OUTPUT"

      # Set PHP version as an environment variable
      - name: Set PHP version
        run: |
          if [ -f .php-version ]; then
            CURRENT_PHP_VERSION=$(cat .php-version)
          else
            CURRENT_PHP_VERSION=${{ inputs.PHP_VERSION }}
          fi

          echo "PHP_VERSION=$CURRENT_PHP_VERSION" >> "$GITHUB_ENV"

      - name: Composer setup
        uses: Humanoidfr/humanoid-github-workflows/.github/actions/composer@main
        with:
          PHP_VERSION: ${{ env.PHP_VERSION }}
          PHP_EXTENSIONS: ${{ inputs.PHP_EXTENSIONS }}
          COMPOSER_CONFIG: ${{ vars.COMPOSER_CONFIG_JSON }}
          INSTALL_AND_CACHE: false

      - name: Disable composer security block
        if: ${{ inputs.BYPASS_SECURITY }}
        run: composer config audit.block-insecure false

      - run: composer update --no-interaction --no-scripts --prefer-dist --no-dev ${{ inputs.BYPASS_SECURITY && '--no-audit' || '' }}

      - name: Generate composer diff
        id: composer_diff
        uses: IonBazan/composer-diff-action@v1
        with:
          base: HEAD
          with-links: true
          no-dev: true
          format: json

      - run: echo "NOW=$(TZ=Europe/Paris date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Get root commits
        id: root_commits
        if: steps.last_tag.outputs.last_tag != ''
        env:
          LAST_TAG: ${{ steps.last_tag.outputs.last_tag }}
        run: |
          commits=$(git log --reverse --no-merges \
            --invert-grep --grep='^release: ' \
            --pretty=format:'%H%x1f%s%x1e' \
            "$LAST_TAG"..HEAD)
          echo "commits_b64=$(printf '%s' "$commits" | base64 -w0)" >> "$GITHUB_OUTPUT"
          if [ -n "$commits" ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to open a release PR
        id: should_release
        run: |
          if [ "${{ steps.composer_diff.outputs.composer_diff_exit_code }}" != "0" ] \
            || [ "${{ steps.root_commits.outputs.has_commits }}" = "true" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PR/commit summary
        uses: actions/github-script@v8
        if: ${{ steps.should_release.outputs.result == 'true' }}
        id: summary
        env:
          COMPOSER_DIFF_JSON: ${{ steps.composer_diff.outputs.composer_diff }}
          NOW: ${{ env.NOW }}
          ROOT_COMMITS_B64: ${{ steps.root_commits.outputs.commits_b64 }}
          ROOT_REPO: ${{ github.repository }}
          LAST_TAG: ${{ steps.last_tag.outputs.last_tag }}
        with:
          result-encoding: string
          github-token: ${{ secrets.REPO_TOKEN }}
          script: |
            let composerDiff;
            try {
              composerDiff = process.env.COMPOSER_DIFF_JSON
                ? JSON.parse(process.env.COMPOSER_DIFF_JSON)
                : { packages: {} };
            } catch (e) {
              composerDiff = { packages: {} };
            }

            function getRootSection() {
              const b64 = process.env.ROOT_COMMITS_B64 || '';
              if (!b64) return [];
              const raw = Buffer.from(b64, 'base64').toString('utf8');
              const records = raw.split('\x1e').map(r => r.trim()).filter(Boolean);
              if (records.length === 0) return [];

              const repo = process.env.ROOT_REPO;
              const lastTag = process.env.LAST_TAG;
              const prRegex = /\(#(\d+)\)$/;

              const lines = records.map(r => {
                const [sha, subject] = r.split('\x1f');
                const linked = subject.replace(prRegex, `(https://github.com/${repo}/pull/$1)`);
                return `* ${linked} ([${sha}](https://github.com/${repo}/commit/${sha}))`;
              });

              const section = [`## ${repo} (root)`, ``, ...lines, ``];
              section.push(`Compare: https://github.com/${repo}/compare/${lastTag}...HEAD`);
              section.push(``);
              return section;
            }

            async function getPackageCommitDetails(pack) {
              const { name, version_base, version_target, operation } = pack;
              if (operation === 'install') {
                return [];
              }
              const [owner, repo] = name.split('/');
              const fromCommit = version_base?.split(' ')[1];
              const toCommit = version_target?.split(' ')[1];
              if (!fromCommit || !toCommit) {
                return [];
              }
              try {
                const { data } = await github.rest.repos.compareCommits({
                  owner: 'Humanoidfr',
                  repo,
                  base: fromCommit,
                  head: toCommit,
                });
                if (data.commits.length === 0) {
                  return [];
                }

                const { commits } = data;

                const commitsFormattedList = commits.map((commit) => {
                  const commitSubject = commit.commit.message.split('\n')[0];
                  const regex = /\(#(\d+)\)$/s;
                  const replacedCommitSubject = commitSubject.replace(regex, `(https://github.com/Humanoidfr/${repo}/pull/$1)`);
                  return `* ${replacedCommitSubject} ([${commit.sha}](${commit.html_url}))`;
                });
                return [...commitsFormattedList];
              } catch (e) {
                console.log(e);
                return [];
              }
            }

            async function getPackageDiff(pack) {
              const { name, operation, version_base, version_target, compare, link } = pack;
              const commitDiff = name.startsWith('humanoid/')
                ? await getPackageCommitDetails(pack)
                : [];

              if (!compare && commitDiff.length === 0) {
                return [];
              }

              const section = [`## ${name} (${operation})`];
              section.push(``);
              if (commitDiff.length) {
                section.push(...commitDiff);
                section.push(``);
              }
              section.push(`Compare: ${compare}`);
              section.push(``);
              return section;
            }

            async function run(diff) {
              const composerDiffPackages = Object.values(diff.packages || {}).sort((a, b) =>
                a.name.startsWith('humanoid/') ? -1 : 1
              );

              const markDown = [`# Update summary of ${process.env.NOW}`];
              markDown.push(``);
              markDown.push(...getRootSection());
              for (const pack of composerDiffPackages) {
                const packageDiff = await getPackageDiff(pack);
                markDown.push(...packageDiff);
              }
              return markDown.join('\n').replace(/"/g, '\\"');
            }
            return run(composerDiff);

      - # Add summary to changelog
        name: Add summary to changelog
        if: ${{ steps.should_release.outputs.result == 'true' }}
        env:
          NOW: ${{ env.NOW }}
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
          fi

          echo "${{ steps.summary.outputs.result }}" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md

      - uses: peter-evans/create-pull-request@v8
        if: ${{ steps.should_release.outputs.result == 'true' }}
        env:
          NOW: ${{ env.NOW }}
        with:
          add-paths: |
            *.lock
            CHANGELOG.md
          commit-message: |
            release: ${{ env.NOW }}

            ${{ steps.summary.outputs.result }}
          branch: update-dependencies
          title: "[${{ env.NOW }}] Update dependencies"
          body: ${{ steps.summary.outputs.result }}
